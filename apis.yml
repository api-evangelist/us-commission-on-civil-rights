    description: >-
      The US Commission on Civil Rights is an independent, bipartisan federal
      agency established in 1957 that investigates, reports on, and issues public
      service announcements about discrimination or denials of equal protection
      based on race, color, religion, sex, age, disability, national origin, or
      in the electoral process. The Commission informs the development of national
      civil rights policy through research, advisory committees, and public reporting.
