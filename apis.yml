position: Consumer
description: >-
  The US Commission on Civil Rights is an independent, bipartisan federal agency
  that investigates, reports on, and issues public service announcements about
  discrimination or denials of equal protection based on race, color, religion,
  sex, age, disability, national origin, or in the electoral process. The Commission
  informs the development of national civil rights policy and laws through factual
  research, advisory committees in all 50 states, and public reporting to the
  President and Congress.
