    title: US Commission on Civil Rights JSON-LD Context
  - type: Features
    data:
      - name: Civil Rights Complaints Data
        description: >-
          Interactive map and datasets of civil rights complaints filed with federal
          agencies, organized by state and subject matter.
      - name: Data Inventory Program
        description: >-
          Annual comprehensive data inventory maintained per the Foundations for
          Evidence-Based Policymaking Act of 2018, with a designated Chief Data Officer.
      - name: No FEAR Act Statistics
        description: >-
          Federal employee discrimination complaint statistics required under the
          Notification and Federal Employee Antidiscrimination and Retaliation Act.
      - name: Advisory Committee Reports
        description: >-
          Reports from 51 state and local advisory committees covering civil rights
          conditions across all 50 states and the District of Columbia.
      - name: Statutory Enforcement Reports
        description: >-
          Congressional and Presidential reports on federal agency civil rights
          enforcement activities and compliance.
  - type: UseCases
    data:
      - name: Civil Rights Policy Research
        description: >-
          Accessing Commission reports, briefing papers, and findings to inform
          civil rights policy development and legislative analysis.
      - name: Discrimination Complaint Analysis
        description: >-
          Analyzing civil rights complaint data by state, subject, and federal
          agency to understand discrimination patterns and trends.
      - name: Federal Agency Compliance Monitoring
        description: >-
          Reviewing No FEAR Act statistics and statutory enforcement data to
          assess federal agency compliance with civil rights laws.
      - name: Academic Research
        description: >-
          Using Commission datasets and reports for academic research on civil
          rights, equal opportunity, and discrimination in the United States.
