aid: us-commission-on-civil-rights
name: US Commission on Civil Rights
description: >-
  The US Commission on Civil Rights is an independent, bipartisan federal
  agency that investigates, reports on, and issues public service announcements
  about discrimination or denials of equal protection based on race, color,
  religion, sex, age, disability, national origin, or in the electoral process.
